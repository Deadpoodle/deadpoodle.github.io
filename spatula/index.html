<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spatula Rain - Ultimate Edition</title>
    <link rel="icon" type="image/x-icon" href="./favicon.ico">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            /* This is the fallback color if images fail */
            background-color: #e8f4f8; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none; 
        }

        /* --- BACKGROUND FADE LAYERS --- */
        .bg-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: opacity 1.5s ease-in-out;
            z-index: -1;
            /* Ensure layers start invisible so the first load is clean */
            opacity: 0;
        }

        /* Force the first layer to be ready for the initial image */
        #bg1 { z-index: -2; }
        #bg2 { z-index: -2; }

        #canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            pointer-events: none; 
        }

        #big-spatula {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 50px;
            height: auto;
            cursor: grab;
            transform: translate(-50%, -50%) rotate(0deg);
            z-index: 10;
            -webkit-user-drag: none;
            touch-action: none;
        }

        .ui-overlay {
            position: absolute;
            bottom: 30px;
            width: 100%;
            text-align: center;
            color: #2c3e50;
            z-index: 5;
            pointer-events: none;
            text-shadow: 0 0 10px rgba(255,255,255,0.9);
        }
    </style>
</head>
<body>

    <div id="bg1" class="bg-layer"></div>
    <div id="bg2" class="bg-layer"></div>

    <canvas id="canvas"></canvas>

    <img id="big-spatula" src="big_spatula.png" alt="Big Spatula" draggable="false">

    <audio id="spatula-audio" src="got_my_spatula.mp3" preload="auto" loop></audio>

    <div class="ui-overlay">
        <h2>Everything's Alright!</h2>
        <p>Oh Everything is A-OK!</p>
    </div>

    <script>
        // --- 1. BACKGROUND CONFIGURATION & CROSSFADE ---
        const bgImages = ['bg1.png', 'bg2.png', 'bg3.png']; 
        let lastBgIndex = -1;
        let currentLayer = 1;

        function changeBackground() {
            if (bgImages.length === 0) return;
            
            let newIndex;
            // If only one image, just use it. Otherwise, don't repeat the last one.
            if (bgImages.length > 1) {
                do {
                    newIndex = Math.floor(Math.random() * bgImages.length);
                } while (newIndex === lastBgIndex);
            } else {
                newIndex = 0;
            }
            
            lastBgIndex = newIndex;
            const imgUrl = `url('${bgImages[newIndex]}')`;
            
            const activeLayer = document.getElementById('bg' + currentLayer);
            const nextLayerId = (currentLayer === 1 ? 2 : 1);
            const nextLayer = document.getElementById('bg' + nextLayerId);

            // Set image on the layer that's about to fade in
            nextLayer.style.backgroundImage = imgUrl;
            
            // Give the browser 50ms to register the image load
            setTimeout(() => {
                nextLayer.style.opacity = "1";
                activeLayer.style.opacity = "0";
                currentLayer = nextLayerId;
            }, 50);
        }

        // IMPORTANT: Initial trigger
        window.addEventListener('DOMContentLoaded', () => {
            changeBackground();
            setInterval(changeBackground, 10000);
        });

        // --- 2. CANVAS & FALLING LOGIC ---
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const bigSpatula = document.getElementById('big-spatula');
        const audio = document.getElementById('spatula-audio');

        let width, height;
        const fallingSpatulas = [];
        const spatulaCount = 45; 
        const fallingImg = new Image();
        fallingImg.src = 'falling_spatula.png';

        let isDragging = false;
        let currentX = window.innerWidth / 2;
        let currentY = window.innerHeight / 2;
        let lastX = currentX;
        let rotation = 0;
        const maxTilt = 25; 

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            fallingSpatulas.length = 0;
            for (let i = 0; i < spatulaCount; i++) {
                fallingSpatulas.push(new Spatula());
            }
        }

        class Spatula {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * -height;
                this.size = Math.random() * 40 + 30;
                this.speed = Math.random() * 3 + 2;
                this.rotation = Math.random() * Math.PI * 2;
                this.spin = (Math.random() - 0.5) * 0.04;
                this.vx = 0;
            }
            update() {
                this.y += this.speed;
                this.rotation += this.spin;
                this.x += this.vx;
                this.vx *= 0.95;

                const dx = this.x - currentX;
                const dy = this.y - currentY;
                const distance = Math.sqrt(dx * dx + dy * dy);
                const pushRadius = 150;

                if (distance < pushRadius) {
                    const angle = Math.atan2(dy, dx);
                    const force = (pushRadius - distance) / pushRadius;
                    this.vx += Math.cos(angle) * force * 15;
                    this.y += Math.sin(angle) * force * 5;
                }

                if (this.y > height + 100) this.reset();
                if (this.x < -50) this.x = width + 50;
                if (this.x > width + 50) this.x = -50;
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.drawImage(fallingImg, -this.size / 2, -this.size / 2, this.size, this.size);
                ctx.restore();
            }
        }

        const startInteraction = (x, y) => {
            isDragging = true;
            currentX = x;
            currentY = y;
            lastX = x;
            if (audio.paused) {
                audio.play().catch(() => {});
            }
        };

        const updateSpatulaVisuals = () => {
            let velocityX = currentX - lastX;
            let targetRotation = velocityX * 1.8; 
            if (targetRotation > maxTilt) targetRotation = maxTilt;
            if (targetRotation < -maxTilt) targetRotation = -maxTilt;
            rotation += (targetRotation - rotation) * 0.15;
            bigSpatula.style.left = currentX + 'px';
            bigSpatula.style.top = currentY + 'px';
            bigSpatula.style.transform = `translate(-50%, -50%) rotate(${rotation}deg)`;
            lastX = currentX;
        };

        bigSpatula.addEventListener('mousedown', (e) => startInteraction(e.clientX, e.clientY));
        bigSpatula.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            startInteraction(touch.clientX, touch.clientY);
            e.preventDefault(); 
        }, { passive: false });

        window.addEventListener('mousemove', (e) => {
            if (isDragging) { currentX = e.clientX; currentY = e.clientY; }
        });

        window.addEventListener('touchmove', (e) => {
            if (isDragging) {
                const touch = e.touches[0];
                currentX = touch.clientX;
                currentY = touch.clientY;
                e.preventDefault();
            }
        }, { passive: false });

        window.addEventListener('mouseup', () => isDragging = false);
        window.addEventListener('touchend', () => isDragging = false);

        function animate() {
            ctx.clearRect(0, 0, width, height);
            if (!isDragging) {
                rotation += (0 - rotation) * 0.1;
                bigSpatula.style.transform = `translate(-50%, -50%) rotate(${rotation}deg)`;
            } else {
                updateSpatulaVisuals();
            }
            fallingSpatulas.forEach(s => { s.update(); s.draw(); });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', init);
        fallingImg.onload = () => { init(); animate(); };
    </script>
</body>
</html>
