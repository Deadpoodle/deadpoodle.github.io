<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Got My Spatula!</title>
    <link rel="icon" type="image/x-icon" href="./favicon.ico">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: transparent; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none; 
        }

        .bg-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: opacity 1.5s ease-in-out;
            z-index: -1; 
        }

        #bg1, #bg2 { opacity: 0; }

        #canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            pointer-events: none; 
        }

        #big-spatula {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 60px; 
            height: auto;
            cursor: grab;
            transform: translate(-50%, -50%) rotate(0deg);
            z-index: 40; 
            -webkit-user-drag: none;
            touch-action: none;
        }

        .score-board {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            color: #ebf5ff;
            z-index: 50;
            pointer-events: none;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7), -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
        }

        .metrics-container {
            position: absolute;
            bottom: 20px;
            right: 20px;
            text-align: right;
            color: #ebf5ff;
            font-size: 18px;
            font-weight: bold;
            z-index: 60;
            pointer-events: none;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7), -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
            line-height: 1.4;
        }

        #fire-container {
            position: absolute;
            bottom: 0;
            left: 33.33%; 
            width: 33.33%; 
            z-index: 20;
            pointer-events: none;
            display: flex;
            align-items: flex-end;
        }

        #fire-gif {
            width: 100%;
            height: auto;
            display: block;
        }

        #fire-container::before, 
        #fire-container::after {
            content: "";
            position: absolute;
            bottom: 0;
            width: 6px;
            height: 25%; 
            background-color: #000;
            border-radius: 2px 2px 0 0;
        }

        #fire-container::before { left: 0; }
        #fire-container::after { right: 0; }

        #stop-btn {
            position: absolute;
            bottom: 20px;
            left: 20px;
            padding: 10px 20px;
            background-color: #2c3e50;
            color: white;
            border: 2px solid transparent;
            border-radius: 5px;
            cursor: pointer;
            z-index: 100;
            font-family: inherit;
            font-weight: bold;
            transition: all 0.2s;
        }

        #stop-btn:hover {
            background-color: #e74c3c;
        }

        /* MOBILE OVERRIDES */
        @media (max-width: 600px) {
            #big-spatula {
                width: 30px; 
            }
            #fire-container {
                width: 50%;  
                left: 25%;   
            }
            .score-board {
                font-size: 22px;
            }
            .metrics-container {
                font-size: 14px;
                bottom: 10px;
                right: 10px;
            }
            #stop-btn {
                bottom: 10px;
                left: 10px;
                width: 50px;
                height: 50px;
                padding: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                border-radius: 4px;
                border: 1px solid rgba(255, 255, 255, 0.3); 
                font-size: 12px;
            }
        }

        #lyrics-display {
            position: absolute;
            bottom: 140px; 
            width: 100%;
            text-align: center;
            color: #ebf5ff;
            z-index: 50;
            pointer-events: none;
            font-size: 22px;
            font-weight: 600;
            min-height: 1.2em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7), -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
        }
    </style>
</head>
<body>
    <div style="position:fixed; top:0; left:0; width:100%; height:100%; background-color:#e8f4f8; z-index:-2;"></div>
    
    <div class="score-board">Problems Solved: <span id="score">0</span></div>

    <div class="metrics-container">
        <div>High Score: <span id="high-score">0</span></div>
        <div>Loops: <span id="loops">0</span></div>
    </div>

    <div id="bg1" class="bg-layer"></div>
    <div id="bg2" class="bg-layer"></div>
    <canvas id="canvas"></canvas>
    
    <div id="fire-container">
        <img src="fire.gif" id="fire-gif" alt="Fire">
    </div>

    <img id="big-spatula" src="big_spatula.png" alt="Big Spatula" draggable="false">
    <audio id="spatula-audio" src="got_my_spatula.mp3" preload="auto" loop></audio>

    <div id="lyrics-display">Grab your Spatula!</div>
    <button id="stop-btn">Stop Music</button>

    <script>
        let stats = {
            highScore: parseInt(localStorage.getItem('spatula_high')) || 0,
            loops: parseInt(localStorage.getItem('spatula_loops')) || 0
        };

        const stopBtn = document.getElementById('stop-btn');

        const updateMetricDisplay = () => {
            document.getElementById('high-score').innerText = stats.highScore;
            document.getElementById('loops').innerText = stats.loops;
        };

        const updateUIStrings = () => {
            stopBtn.innerText = (window.innerWidth <= 600) ? "Stop" : "Stop Music";
        };

        updateMetricDisplay();
        updateUIStrings();

        const saveStats = () => {
            localStorage.setItem('spatula_high', stats.highScore);
            localStorage.setItem('spatula_loops', stats.loops);
        };

        const audio = document.getElementById('spatula-audio');
        audio.addEventListener('seeked', function() {
            if (audio.currentTime < 0.5) {
                stats.loops++;
                updateMetricDisplay();
                saveStats();
            }
        });

        const lyrics = [
            { time: 5.48, text: "Everything's alright" },
            { time: 7.66, text: "Oh everything is A-O-K" },
            { time: 11.98, text: "Everything is great" },
            { time: 15.42, text: "Cuz I got my spatula" },
            { time: 20.98, text: "Everything's alright" },
            { time: 23.66, text: "Oh everything is A-O-K" },
            { time: 27.98, text: "Everything is great" },
            { time: 32.38, text: "Cuz I got my spatula" },
            { time: 36.89, text: "Don't need no broiler pan" },
            { time: 39.89, text: "Don't need a big spoon, yeah" },
            { time: 44.89, text: "Don't need no Ginsu knives" },
            { time: 47.98, text: "Cuz it's my spatula that makes me swoon" },
            { time: 52.94, text: "Everything's alright" },
            { time: 55.53, text: "Oh everything is A-O-K" },
            { time: 60.94, text: "Everything is great" }, 
            { time: 63.34, text: "Cuz I got my spatula" },
            { time: 68.93, text: "Everything's alright" },
            { time: 71.58, text: "Oh everything is A-O-K" },
            { time: 75.93, text: "Everything is great" },
            { time: 79.34, text: "Cuz I got my spatula" },
            { time: 86.74, text: "Yeah" }
        ];

        const lyricsDisplay = document.getElementById('lyrics-display');

        function updateLyrics() {
            const currentTime = audio.currentTime;
            let currentText = "Grab your Spatula!"; 
            for (let i = lyrics.length - 1; i >= 0; i--) {
                if (currentTime >= lyrics[i].time) {
                    currentText = lyrics[i].text;
                    break;
                }
            }
            if (lyricsDisplay.innerText !== currentText) {
                lyricsDisplay.innerText = currentText;
            }
        }

        stopBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            audio.pause();
            audio.currentTime = 0;
            lyricsDisplay.innerText = "Grab your Spatula!";
        });

        const bgImages = ['bg1.png', 'bg2.png', 'bg3.png', 'bg4.png', 'bg5.png', 'bg6.png', 'bg7.png', 'bg8.png']; 
        let lastBgIndex = -1, currentLayer = 1, sessionScore = 0;
        const scoreDisplay = document.getElementById('score');
        const directory = window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/'));

        function changeBackground(isInitial = false) {
            if (bgImages.length === 0) return;
            let newIndex;
            do { newIndex = Math.floor(Math.random() * bgImages.length); } while (newIndex === lastBgIndex && bgImages.length > 1);
            lastBgIndex = newIndex;
            const fullPath = `${directory}/${bgImages[newIndex]}`;
            const imgUrl = `url("${fullPath}")`;
            const l1 = document.getElementById('bg1'), l2 = document.getElementById('bg2');

            if (isInitial) {
                l1.style.backgroundImage = imgUrl; l1.style.opacity = "1"; currentLayer = 1;
            } else {
                const active = (currentLayer === 1) ? l1 : l2, next = (currentLayer === 1) ? l2 : l1;
                next.style.backgroundImage = imgUrl;
                setTimeout(() => { next.style.opacity = "1"; active.style.opacity = "0"; currentLayer = (currentLayer === 1 ? 2 : 1); }, 100);
            }
        }
        changeBackground(true); 
        setInterval(() => changeBackground(false), 12000);

        const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d');
        const bigSpatula = document.getElementById('big-spatula');
        let width, height, lastX;
        const fallingSpatulas = [], spatulaCount = 40; 
        const fallingImg = new Image(); fallingImg.src = 'falling_spatula.png';

        let isDragging = false, currentX = window.innerWidth / 2, currentY = window.innerHeight / 2, rotation = 0;

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            fallingSpatulas.length = 0;
            for (let i = 0; i < spatulaCount; i++) fallingSpatulas.push(new Spatula());
            lastX = currentX;
            updateUIStrings();
        }

        class Spatula {
            constructor() { 
                this.gravity = 0.15; 
                this.reset(); 
            }
            reset() {
                this.x = Math.random() * width; 
                this.y = Math.random() * -height;
                this.baseSpeed = Math.random() * 2 + 1.5; 
                this.dy = this.baseSpeed; 
                this.vx = 0; 
                this.size = Math.random() * 35 + 25; 
                this.rotation = Math.random() * Math.PI * 2; 
                this.spin = (Math.random() - 0.5) * 0.03;
                this.counted = false;
            }
            update() {
                this.x += this.vx;
                this.y += this.dy;
                this.vx *= 0.96;

                // Gravity logic: Return to baseSpeed if pushed up or slowed down
                if (this.dy < this.baseSpeed) {
                    this.dy += this.gravity;
                } else {
                    this.dy *= 0.99; // Air resistance for fast falling objects
                }

                const dx = this.x - currentX, dy = this.y - currentY;
                const dist = Math.sqrt(dx*dx + dy*dy);
                
                if (dist < 140) {
                    const angle = Math.atan2(dy, dx);
                    const force = 10;
                    this.vx += Math.cos(angle) * force;
                    this.dy += Math.sin(angle) * force; 
                }
                
                let bWidthPercent = window.innerWidth <= 600 ? 0.5 : 0.3333;
                let bLeftPercent = window.innerWidth <= 600 ? 0.25 : 0.3333;
                const bL = width * bLeftPercent;
                const bR = width * (bLeftPercent + bWidthPercent);
                
                if (this.y > height - 100 && !this.counted) {
                    if (this.x > bL && this.x < bR) { 
                        sessionScore++; 
                        if (sessionScore > stats.highScore) {
                            stats.highScore = sessionScore;
                        }
                        scoreDisplay.innerText = sessionScore; 
                        updateMetricDisplay();
                        saveStats();
                    }
                    this.counted = true;
                }
                if (this.y > height + 50) this.reset();
            }
            draw() {
                ctx.save(); 
                ctx.translate(this.x, this.y); 
                ctx.rotate(this.rotation);
                ctx.drawImage(fallingImg, -this.size/2, -this.size/2, this.size, this.size); 
                ctx.restore();
            }
        }

        const handleInteraction = (x, y) => {
            if (audio.paused) {
                audio.currentTime = 0;
                audio.play().catch(() => {});
            }
            isDragging = true;
            currentX = x; currentY = y;
        };

        bigSpatula.addEventListener('mousedown', e => handleInteraction(e.clientX, e.clientY));
        bigSpatula.addEventListener('touchstart', e => {
            if (e.cancelable) e.preventDefault();
            handleInteraction(e.touches[0].clientX, e.touches[0].clientY);
        }, { passive: false });

        window.addEventListener('mousemove', e => { if (isDragging) { currentX = e.clientX; currentY = e.clientY; } });
        window.addEventListener('touchmove', e => { if (isDragging) { currentX = e.touches[0].clientX; currentY = e.touches[0].clientY; } }, { passive: false });
        window.addEventListener('mouseup', () => isDragging = false);
        window.addEventListener('touchend', () => isDragging = false);

        function animate() {
            ctx.clearRect(0, 0, width, height);
            let velX = currentX - lastX;
            let targetRot = isDragging ? velX * 1.5 : 0;
            rotation += (targetRot - rotation) * 0.1;
            bigSpatula.style.left = currentX + 'px';
            bigSpatula.style.top = currentY + 'px';
            bigSpatula.style.transform = `translate(-50%, -50%) rotate(${rotation}deg)`;
            lastX = currentX;
            fallingSpatulas.forEach(s => { s.update(); s.draw(); });
            if (!audio.paused) updateLyrics();
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', init);
        fallingImg.onload = () => { init(); animate(); };
    </script>
</body>
</html>
