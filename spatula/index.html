<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Got My Spatula!</title>
    <link rel="icon" type="image/x-icon" href="./favicon.ico">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #e8f4f8; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none; 
        }

        .bg-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: opacity 1.5s ease-in-out;
            z-index: -1;
        }

        #bg1 { opacity: 1; }
        #bg2 { opacity: 0; }

        #canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            pointer-events: none; 
        }

        #big-spatula {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 50px;
            height: auto;
            cursor: grab;
            transform: translate(-50%, -50%) rotate(0deg);
            z-index: 10;
            -webkit-user-drag: none;
            touch-action: none;
        }

        .ui-overlay {
            position: absolute;
            bottom: 30px;
            width: 100%;
            text-align: center;
            color: #2c3e50;
            z-index: 5;
            pointer-events: none;
            text-shadow: 0 0 10px rgba(255,255,255,0.9);
        }
    </style>
</head>
<body>

    <div id="bg1" class="bg-layer"></div>
    <div id="bg2" class="bg-layer"></div>

    <canvas id="canvas"></canvas>

    <img id="big-spatula" src="big_spatula.png" alt="Big Spatula" draggable="false">

    <audio id="spatula-audio" src="got_my_spatula.mp3" preload="auto" loop></audio>

    <div class="ui-overlay">
        <h2>Everything's Alright!</h2>
        <p>Oh Everything is A-OK!</p>
    </div>

    <script>
        // --- 1. BACKGROUND CONFIGURATION ---
        const bgImages = ['bg1.png', 'bg2.png', 'bg3.png']; 
        let lastBgIndex = -1;
        let currentLayer = 1;

        // Apply the specific directory fix here
        const directory = window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/'));

        function changeBackground() {
            if (bgImages.length === 0) return;
            let newIndex;
            do {
                newIndex = Math.floor(Math.random() * bgImages.length);
            } while (newIndex === lastBgIndex && bgImages.length > 1);
            
            lastBgIndex = newIndex;
            
            // PATH FIX: Combines directory with image name
            const fullPath = `${directory}/${bgImages[newIndex]}`;
            const imgUrl = `url('${fullPath}')`;
            
            const activeLayer = document.getElementById('bg' + currentLayer);
            const nextLayer = document.getElementById('bg' + (currentLayer === 1 ? 2 : 1));

            nextLayer.style.backgroundImage = imgUrl;
            
            setTimeout(() => {
                nextLayer.style.opacity = 1;
                activeLayer.style.opacity = 0;
                currentLayer = (currentLayer === 1 ? 2 : 1);
            }, 50);
        }

        setInterval(changeBackground, 10000);
        changeBackground(); 

        // --- 2. CANVAS & FALLING LOGIC ---
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const bigSpatula = document.getElementById('big-spatula');
        const audio = document.getElementById('spatula-audio');

        let width, height;
        const fallingSpatulas = [];
        const spatulaCount = 45; 
        const fallingImg = new Image();
        fallingImg.src = 'falling_spatula.png';

        let isDragging = false;
        let currentX = window.innerWidth / 2;
        let currentY = window.innerHeight / 2;
        let lastX = currentX;
        let rotation = 0;
        const maxTilt = 25; 

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            fallingSpatulas.length = 0;
            for (let i = 0; i < spatulaCount; i++) {
                fallingSpatulas.push(new Spatula());
            }
        }

        class Spatula {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * -height;
                this.size = Math.random() * 40 + 30;
                this.speed = Math.random() * 3 + 2;
                this.rotation = Math.random() * Math.PI * 2;
                this.spin = (Math.random() - 0.5) * 0.04;
                this.vx = 0;
            }
            update() {
                this.y += this.speed;
                this.rotation += this.spin;
                this.x += this.vx;
                this.vx *= 0.95;
                const dx = this.x - currentX;
                const dy = this.y - currentY;
                const distance = Math.sqrt(dx * dx + dy * dy);
                if (distance < 150) {
                    const angle = Math.atan2(dy, dx);
                    this.vx += Math.cos(angle) * ((150 - distance) / 150) * 15;
                    this.y += Math.sin(angle) * ((150 - distance) / 150) * 5;
                }
                if (this.y > height + 100) this.reset();
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.drawImage(fallingImg, -this.size / 2, -this.size / 2, this.size, this.size);
                ctx.restore();
            }
        }

        // --- 3. INTERACTION & AUDIO FIX (ANDROID) ---
        const startInteraction = (x, y) => {
            isDragging = true;
            currentX = x;
            currentY = y;
            lastX = x;
        };

        const tryPlayAudio = () => {
            if (audio.paused) {
                audio.play().catch(e => console.log("Audio play failed:", e));
            }
        };

        bigSpatula.addEventListener('mousedown', (e) => {
            startInteraction(e.clientX, e.clientY);
            tryPlayAudio();
        });

        bigSpatula.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            startInteraction(touch.clientX, touch.clientY);
            tryPlayAudio();
            e.preventDefault(); 
        }, { passive: false });

        window.addEventListener('mousemove', (e) => {
            if (isDragging) { currentX = e.clientX; currentY = e.clientY; }
        });

        window.addEventListener('touchmove', (e) => {
            if (isDragging) {
                const touch = e.touches[0];
                currentX = touch.clientX;
                currentY = touch.clientY;
                e.preventDefault();
            }
        }, { passive: false });

        window.addEventListener('mouseup', () => isDragging = false);
        window.addEventListener('touchend', () => isDragging = false);

        function animate() {
            ctx.clearRect(0, 0, width, height);
            let velocityX = currentX - lastX;
            let targetRotation = isDragging ? velocityX * 1.8 : 0;
            if (targetRotation > maxTilt) targetRotation = maxTilt;
            if (targetRotation < -maxTilt) targetRotation = -maxTilt;
            rotation += (targetRotation - rotation) * 0.15;

            bigSpatula.style.left = currentX + 'px';
            bigSpatula.style.top = currentY + 'px';
            bigSpatula.style.transform = `translate(-50%, -50%) rotate(${rotation}deg)`;
            
            lastX = currentX;
            fallingSpatulas.forEach(s => { s.update(); s.draw(); });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', init);
        fallingImg.onload = () => { init(); animate(); };
    </script>
</body>
</html>
