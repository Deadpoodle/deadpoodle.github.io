<!DOCTYPE html>
<html lang="en" style="background-color: #000;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Got My Spatula!</title>
    <link rel="icon" type="image/x-icon" href="./favicon.ico">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none; 
        }

        .bg-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: opacity 1.5s ease-in-out;
            z-index: 1; 
        }

        #bg1 { opacity: 1; }
        #bg2 { opacity: 0; }

        #canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10; 
            pointer-events: none; 
        }

        #big-spatula {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 60px; 
            height: auto;
            cursor: grab;
            transform: translate(-50%, -50%) rotate(0deg);
            z-index: 40; 
            -webkit-user-drag: none;
            touch-action: none;
            display: block;
        }

        .score-board {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            color: #ebf5ff;
            z-index: 50;
            pointer-events: none;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7), -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
        }

        .metrics-container {
            position: absolute;
            bottom: 20px;
            right: 20px;
            text-align: right;
            color: #ebf5ff;
            font-size: 18px;
            font-weight: bold;
            z-index: 60;
            pointer-events: none;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7), -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
            line-height: 1.4;
        }

        #fire-container {
            position: absolute;
            bottom: 0;
            left: 33.33%; 
            width: 33.33%; 
            z-index: 20;
            pointer-events: none;
            display: flex;
            align-items: flex-end;
        }

        #fire-container::before, #fire-container::after {
            content: "";
            position: absolute;
            bottom: 0;
            width: 8px;
            height: 35%; 
            background-color: #000;
            border-radius: 4px 4px 0 0;
            z-index: 21;
        }
        #fire-container::before { left: 0; }
        #fire-container::after { right: 0; }

        #fire-gif { width: 100%; height: auto; display: block; }

        #stop-btn {
            position: absolute;
            bottom: 20px;
            left: 20px;
            padding: 10px 20px;
            background-color: #2c3e50;
            color: white;
            border: 2px solid white;
            border-radius: 5px;
            cursor: pointer;
            z-index: 100;
            font-family: inherit;
            font-weight: bold;
        }

        #lyrics-display {
            position: absolute;
            bottom: 140px; 
            width: 100%;
            text-align: center;
            color: #ebf5ff;
            z-index: 50;
            pointer-events: none;
            font-size: 24px;
            font-weight: 800;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8), -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
        }

        #mobile-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 200;
            color: white; text-align: center;
        }

        #play-button-img { width: 180px; height: auto; cursor: pointer; filter: drop-shadow(0 0 20px rgba(255,255,255,0.6)); }

        /* MOBILE OVERRIDES */
        @media (max-width: 600px) {
            #big-spatula { 
                width: 30px; 
                display: none; 
            }
            #fire-container { width: 60%; left: 20%; }
            .score-board { font-size: 22px; }
            #mobile-overlay { display: flex; }
            
            #stop-btn {
                width: 40px;  /* Reduced to 40px */
                height: 40px; /* Reduced to 40px */
                padding: 0;
                bottom: 10px; 
                left: 10px;   
                display: flex;
                justify-content: center;
                align-items: center;
                font-size: 12px;
            }
            #stop-btn span { display: none; } 
            #stop-btn::after { content: "Stop"; } 

            .metrics-container {
                font-size: 10px; /* Reduced font size to 10px */
                bottom: 10px;    
                right: 10px;     
            }
            #high-label { display: none; } /* Hide "High Score" */
            #mobile-high-label::before { content: "High: "; } /* Show "High" */
        }
    </style>
</head>
<body>

    <div id="mobile-overlay">
        <img src="play.png" id="play-button-img" alt="Play">
        <h2 style="margin: 20px 0 0 0; font-family: sans-serif;">TAP TO BEGIN</h2>
    </div>

    <div id="bg1" class="bg-layer"></div>
    <div id="bg2" class="bg-layer"></div>
    
    <div class="score-board">Problems Solved: <span id="score">0</span></div>

    <div class="metrics-container">
        <div><span id="high-label">High Score: </span><span id="mobile-high-label"></span><span id="high-score">0</span></div>
        <div>Loops: <span id="loops">0</span></div>
    </div>

    <canvas id="canvas"></canvas>
    
    <div id="fire-container">
        <img src="fire.gif" id="fire-gif">
    </div>

    <img id="big-spatula" src="big_spatula.png" alt="Spatula" draggable="false">
    
    <audio id="spatula-audio" src="got_my_spatula.mp3" preload="auto" loop></audio>
    <div id="lyrics-display">Grab your Spatula!</div>
    <button id="stop-btn"><span>Stop Music</span></button>

    <script>
        let stats = {
            highScore: parseInt(localStorage.getItem('spatula_high')) || 0,
            loops: parseInt(localStorage.getItem('spatula_loops')) || 0
        };

        const audio = document.getElementById('spatula-audio');
        const bigSpatula = document.getElementById('big-spatula');
        const overlay = document.getElementById('mobile-overlay');
        const playImg = document.getElementById('play-button-img');
        const lyricsDisplay = document.getElementById('lyrics-display');
        const scoreDisplay = document.getElementById('score');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let sessionScore = 0;
        let problemCounter = 0; 
        let isDragging = false;
        let currentX = window.innerWidth / 2;
        let currentY = window.innerHeight / 2;
        let lastX = currentX;
        let lastY = currentY;
        let rotation = 0;
        let audioStarted = false;
        
        let fallingSpatulas = [];
        const fallingImg = new Image();
        fallingImg.src = 'falling_spatula.png';

        const lyrics = [
            { time: 0, text: "Grab your Spatula!" },
            { time: 5.48, text: "Everything's alright" },
            { time: 7.66, text: "Oh everything is A-O-K" },
            { time: 11.98, text: "Everything is great" },
            { time: 15.42, text: "Cuz I got my spatula" },
            { time: 20.98, text: "Everything's alright" },
            { time: 23.66, text: "Oh everything is A-O-K" },
            { time: 27.98, text: "Everything is great" },
            { time: 32.38, text: "Cuz I got my spatula" },
            { time: 36.89, text: "Don't need no broiler pan" },
            { time: 39.89, text: "Don't need a big spoon, yeah" },
            { time: 44.89, text: "Don't need no Ginsu knives" },
            { time: 47.98, text: "Cuz it's my spatula that makes me swoon" },
            { time: 52.94, text: "Everything's alright" },
            { time: 55.53, text: "Oh everything is A-O-K" },
            { time: 60.94, text: "Everything is great" },
            { time: 63.34, text: "Cuz I got my spatula" },
            { time: 68.93, text: "Everything's alright" },
            { time: 71.58, text: "Oh everything is A-O-K" },
            { time: 75.93, text: "Everything is great" },
            { time: 79.34, text: "Cuz I got my spatula" }
        ];

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            updateMetricDisplay();
        }

        function spawnSpatulas() {
            if (fallingSpatulas.length > 0) return; 
            let desiredCount = 35 + sessionScore;
            let finalCount = Math.min(desiredCount, 100);
            for (let i = 0; i < finalCount; i++) {
                fallingSpatulas.push(new SpatulaPiece());
            }
        }

        function updateMetricDisplay() {
            document.getElementById('high-score').innerText = stats.highScore;
            document.getElementById('loops').innerText = stats.loops;
            scoreDisplay.innerText = problemCounter; 
        }

        class SpatulaPiece {
            constructor() { this.gravity = 0.15; this.reset(); }
            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * -height;
                this.baseSpeed = Math.random() * 2 + 1.5;
                this.dy = this.baseSpeed;
                this.vx = (Math.random() - 0.5) * 2;
                this.size = Math.random() * 35 + 25;
                this.rotation = Math.random() * Math.PI * 2;
                this.spin = (Math.random() - 0.5) * 0.08;
                this.counted = false;
            }
            update() {
                this.x += this.vx; this.y += this.dy; this.rotation += this.spin; this.vx *= 0.98;
                if (this.dy < this.baseSpeed) this.dy += this.gravity; else this.dy *= 0.995;
                const dx = this.x - currentX; const dy = this.y - currentY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 130) {
                    const angle = Math.atan2(dy, dx); const force = (130 - dist) * 0.15;
                    this.vx += Math.cos(angle) * force + (currentX - lastX) * 0.5;
                    this.dy += Math.sin(angle) * force + (currentY - lastY) * 0.5;
                }
                const isMobile = window.innerWidth <= 600;
                let fireWidthPercent = isMobile ? 0.6 : 0.333;
                let fireLeftPercent = isMobile ? 0.2 : 0.333;
                if (this.y > (height - 80) && !this.counted) {
                    let leftBound = width * fireLeftPercent;
                    let rightBound = width * (fireLeftPercent + fireWidthPercent);
                    if (this.x > leftBound && this.x < rightBound) {
                        problemCounter++; sessionScore++;
                        if (sessionScore > stats.highScore) {
                            stats.highScore = sessionScore;
                            localStorage.setItem('spatula_high', stats.highScore);
                        }
                        updateMetricDisplay();
                    }
                    this.counted = true;
                }
                if (this.y > height + 100) this.reset();
            }
            draw() {
                ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.rotation);
                ctx.drawImage(fallingImg, -this.size/2, -this.size/2, this.size, this.size);
                ctx.restore();
            }
        }

        function startMusic() {
            audio.play().then(() => {
                audioStarted = true; overlay.style.display = 'none';
                bigSpatula.style.display = 'block'; spawnSpatulas();
            }).catch(err => console.log("Audio fail: ", err));
        }

        playImg.addEventListener('click', startMusic);

        document.getElementById('stop-btn').addEventListener('click', () => {
            audio.pause(); audio.currentTime = 0; audioStarted = false;
            problemCounter = 0; sessionScore = 0; 
            fallingSpatulas = []; lyricsDisplay.innerText = "Grab your Spatula!";
            currentX = window.innerWidth / 2; currentY = window.innerHeight / 2;
            lastX = currentX; lastY = currentY; rotation = 0;
            updateMetricDisplay();
            if (window.innerWidth <= 600) {
                overlay.style.display = 'flex';
                bigSpatula.style.display = 'none';
            }
        });

        audio.addEventListener('timeupdate', () => {
            if (audio.currentTime < 0.5 && audioStarted && problemCounter > 0) {
                stats.loops++; localStorage.setItem('spatula_loops', stats.loops);
                problemCounter = 0; updateMetricDisplay();
                fallingSpatulas = []; spawnSpatulas(); 
            }
        });

        const bgList = ['./bg1.png','./bg2.png','./bg3.png','./bg4.png','./bg5.png','./bg6.png','./bg7.png','./bg8.png'];
        let bgIdx = 0; let currentLyr = 1;
        function cycleBg() {
            let next; do { next = Math.floor(Math.random() * bgList.length); } while (next === bgIdx);
            bgIdx = next; const l1 = document.getElementById('bg1'); const l2 = document.getElementById('bg2');
            if (currentLyr === 1) {
                l2.style.backgroundImage = `url("${bgList[bgIdx]}")`; l2.style.opacity = 1; l1.style.opacity = 0; currentLyr = 2;
            } else {
                l1.style.backgroundImage = `url("${bgList[bgIdx]}")`; l1.style.opacity = 1; l2.style.opacity = 0; currentLyr = 1;
            }
        }
        document.getElementById('bg1').style.backgroundImage = `url("${bgList[0]}")`;
        setInterval(cycleBg, 12000);

        function updateSpatulaPosition(x, y) {
            currentX = x; currentY = y;
            if (!audioStarted && window.innerWidth > 600) startMusic();
        }

        bigSpatula.addEventListener('mousedown', (e) => { isDragging = true; updateSpatulaPosition(e.clientX, e.clientY); });
        window.addEventListener('mousemove', (e) => { if (isDragging) updateSpatulaPosition(e.clientX, e.clientY); });
        window.addEventListener('mouseup', () => isDragging = false);
        bigSpatula.addEventListener('touchstart', (e) => { isDragging = true; updateSpatulaPosition(e.touches[0].clientX, e.touches[0].clientY); });
        window.addEventListener('touchmove', (e) => { if (isDragging) { e.preventDefault(); updateSpatulaPosition(e.touches[0].clientX, e.touches[0].clientY); } }, { passive: false });
        window.addEventListener('touchend', () => isDragging = false);

        function animate() {
            ctx.clearRect(0, 0, width, height);
            let deltaX = currentX - lastX;
            rotation += (deltaX * 1.8 - rotation) * 0.1;
            bigSpatula.style.left = currentX + 'px';
            bigSpatula.style.top = currentY + 'px';
            bigSpatula.style.transform = `translate(-50%, -50%) rotate(${rotation}deg)`;
            lastX = currentX; lastY = currentY;
            for (let i = 0; i < fallingSpatulas.length; i++) {
                fallingSpatulas[i].update(); fallingSpatulas[i].draw();
            }
            if (audioStarted) {
                let currentText = lyrics[0].text;
                for (let i = lyrics.length - 1; i >= 0; i--) {
                    if (audio.currentTime >= lyrics[i].time) { currentText = lyrics[i].text; break; }
                }
                lyricsDisplay.innerText = currentText;
            }
            requestAnimationFrame(animate);
        }
        window.addEventListener('resize', init);
        fallingImg.onload = function() { init(); animate(); };
    </script>
</body>
</html>
