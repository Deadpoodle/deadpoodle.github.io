<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deadpoodle</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 3rem 2rem 2rem;
      text-align: center;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: #f1f5f9;
    }

    header p {
      margin-top: 0.5rem;
      font-size: 0.95rem;
      color: #64748b;
    }

    main {
      flex: 1;
      max-width: 720px;
      width: 100%;
      margin: 3rem auto;
      padding: 0 1.5rem;
    }

    h2 {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #475569;
      margin-bottom: 1rem;
    }

    .project-list {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .project-card {
      display: flex;
      align-items: center;
      gap: 1.25rem;
      padding: 1.25rem 1.5rem;
      background: #1e2230;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 8px;
      text-decoration: none;
      color: inherit;
      transition: background 0.15s, border-color 0.15s;
    }

    .project-card:hover {
      background: #252b3b;
      border-color: rgba(255,255,255,0.14);
    }

    .project-icon {
      font-size: 1.6rem;
      flex-shrink: 0;
      width: 2.5rem;
      text-align: center;
    }

    .project-info { flex: 1; min-width: 0; }

    .project-name {
      font-size: 1rem;
      font-weight: 600;
      color: #f1f5f9;
    }

    .project-desc {
      font-size: 0.85rem;
      color: #64748b;
      margin-top: 0.2rem;
    }

    .project-url {
      font-size: 0.75rem;
      color: #334155;
      font-family: monospace;
      flex-shrink: 0;
    }

    footer {
      text-align: center;
      padding: 1.5rem;
      font-size: 0.75rem;
      color: #334155;
      border-top: 1px solid rgba(255,255,255,0.05);
    }
  </style>
</head>
<body>

<header>
  <h1>Deadpoodle</h1>
  <p>Personal projects hosted on GitHub Pages</p>
</header>

<main>
  <h2>Projects</h2>
  <div class="project-list">

    <a class="project-card" href="./itemgenerator/index.html">
      <div class="project-icon">⚔️</div>
      <div class="project-info">
        <div class="project-name">Artifex Arcanum</div>
        <div class="project-desc">D&amp;D homebrew magic item card creator</div>
      </div>
      <div class="project-url">/itemgenerator</div>
    </a>

    <a class="project-card" href="./spatula/index.html">
      <div class="project-icon">🥄</div>
      <div class="project-info">
        <div class="project-name">Spatula</div>
        <div class="project-desc">I got my spatula!</div>
      </div>
      <div class="project-url">/spatula</div>
    </a>

  </div>
</main>

<footer>
  deadpoodle.github.io
</footer>

</body>
</html>
